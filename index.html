<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>싸이월드</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: black;
      transition: background 0.8s ease;
      font-family: 'Dotum', '돋움', 'Gulim', sans-serif;
      font-size: 11px;
      overflow: hidden;
    }

    body.xp {
      background: url('image/wallpaper.jpg') center/cover no-repeat;
    }

    body.hompy-bg {
      background: url('image/wallpaper.jpg') center/cover no-repeat;
    }

    .logo {
      width: 50px;
      cursor: pointer;
    }

    .desktop {
      display: none;
      position: absolute;
      top: 20px;
      left: 20px;
      flex-direction: column;
      align-items: flex-start;
      gap: 20px;
    }

    body.xp .desktop {
      display: flex;
    }

    .icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .icon img {
      width: 50px;
    }

    .icon span {
      color: white;
      font-size: 12px;
      font-family: 'Tahoma', sans-serif;
      text-shadow: 1px 1px 2px black;
    }

    .taskbar {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 36px;
      background: linear-gradient(180deg, #d4d0c8 0%, #c0bdb5 50%, #a8a49c 100%);
      border-top: 2px solid #ffffff;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: 0 6px;
      z-index: 999;
    }

    body.xp .taskbar {
      display: flex;
    }

    .start-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: linear-gradient(180deg, #e0ddd5 0%, #c0bdb5 100%);
      border: 1px solid #ffffff;
      border-right-color: #808080;
      border-bottom-color: #808080;
      padding: 2px 8px;
      font-size: 11px;
      font-family: 'Tahoma', sans-serif;
      font-weight: bold;
      cursor: pointer;
      height: 24px;
    }

    .start-btn img {
      width: 16px;
      height: 16px;
    }

    .clock {
      background: linear-gradient(180deg, #a8a49c 0%, #c0bdb5 100%);
      border: 1px solid #808080;
      border-right-color: #ffffff;
      border-bottom-color: #ffffff;
      padding: 2px 6px;
      font-size: 11px;
      font-family: 'Tahoma', sans-serif;
      height: 24px;
      display: flex;
      align-items: center;
    }

    .toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(180deg, #3366cc, #1144aa);
      color: white;
      padding: 7px 18px;
      font-size: 11px;
      border: 1px solid #6699ff;
      border-radius: 3px;
      z-index: 9999;
      display: none;
      box-shadow: 0 2px 8px rgba(0, 0, 80, 0.4);
    }

    .toast.show {
      display: block;
    }

    .cy-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .cy-overlay.visible {
      display: flex;
    }

    .cy-page {
      background: white;
      border-radius: 10px;
      width: 85vw;
      max-width: 360px;
      min-height: 420px;
      max-height: 85vh;
      border: none;
      position: relative;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 28px;
      overflow-y: auto;
    }

    .cy-notebook {
      background: transparent;
      border-radius: 14px;
      padding: 0;
      box-shadow: none;
    }

    .cy-page.active {
      display: flex;
    }

    .cy-page::before {
      display: none;
    }

    .cy-page::after {
      display: none;
    }

    .cy-logo-txt {
      font-size: 38px;
      font-weight: 900;
      font-family: 'Arial Black', sans-serif;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #ff6600, #ffcc00, #00cc44, #0066ff, #cc00cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .cy-input {
      width: 100%;
      background: #f4f6f8;
      border: none;
      border-radius: 12px;
      padding: 15px 18px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      box-sizing: border-box;
      margin-bottom: 10px;
      color: #333;
    }

    .cy-input:focus {
      background: #eef0f3;
    }

    .cy-btn-main {
      width: 100%;
      background: linear-gradient(135deg, #ff7a00, #ff5500);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 15px;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 1px;
    }

    .cy-btn-main:hover {
      opacity: 0.9;
    }

    /* ===== 홈피 전체화면 ===== */
    #hompy-full {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      z-index: 500;
      overflow: hidden;
      justify-content: center;
      align-items: center;
    }

    #hompy-full.visible {
      display: flex;
    }

    .hompy-notebook {
      background: #4db8e8;
      border-radius: 14px;
      padding: 10px;
      width: 95vw;
      max-width: 900px;
      height: 90vh;
      box-shadow: 0 4px 24px rgba(0, 80, 140, 0.5);
    }

    .hompy-notebook-inner {
      background: white;
      border-radius: 8px;
      border: 2px dashed #90cce8;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .btn {
      background: linear-gradient(180deg, #eef4ff, #d0e0f8);
      border: 1px solid #7799cc;
      padding: 3px 12px;
      font-size: 11px;
      font-family: 'Dotum', sans-serif;
      cursor: pointer;
      border-radius: 2px;
      color: #224488;
    }

    .btn:hover {
      background: linear-gradient(180deg, #ffffff, #ddeeff);
    }

    .btn-blue {
      background: linear-gradient(180deg, #3366cc, #1144aa);
      color: white;
      border-color: #2255bb;
    }

    .btn-blue:hover {
      background: linear-gradient(180deg, #4477dd, #2255bb);
    }

    .btn-red {
      background: linear-gradient(180deg, #ee4444, #cc2222);
      color: white;
      border-color: #bb1111;
    }

    .sm {
      padding: 2px 8px;
      font-size: 10px;
    }

    .tlink {
      color: #0055cc;
      text-decoration: underline;
      cursor: pointer;
    }

    .tlink:hover {
      color: #ff4400;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #4477cc;
    }

    .frow {
      display: flex;
      align-items: center;
      margin-bottom: 5px;
      gap: 5px;
    }

    .frow label {
      width: 58px;
      font-size: 11px;
      color: #336;
      flex-shrink: 0;
    }

    .frow input,
    .frow textarea {
      flex: 1;
      border: 1px solid #99aacc;
      padding: 2px 4px;
      font-size: 11px;
      font-family: 'Dotum', sans-serif;
      background: white;
      border-radius: 1px;
    }

    .frow textarea {
      height: 55px;
      resize: none;
    }

    .fbox {
      border: 1px solid #99aacc;
      padding: 10px;
      margin: 7px 0;
      background: linear-gradient(180deg, #f5f8ff, #eaf0ff);
      border-radius: 3px;
    }

    .fbox h3 {
      font-size: 12px;
      color: #1144aa;
      border-bottom: 1px solid #bbccee;
      padding-bottom: 4px;
      margin-bottom: 7px;
    }

    .bgmbar {
      background: linear-gradient(90deg, #0a1a3a, #0d2050);
      color: #66aaff;
      padding: 3px 10px;
      font-size: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-top: 1px solid #224488;
      border-bottom: 1px solid #224488;
      flex-shrink: 0;
    }

    .bgmt {
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .bgmc {
      cursor: pointer;
      color: #ffcc00;
      font-size: 12px;
    }

    .cy-header-top {
      padding: 5px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cy-logo-sm {
      color: #ffee00;
      font-size: 16px;
      font-weight: 900;
      font-family: 'Arial Black', sans-serif;
      letter-spacing: -1px;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.4);
    }

    .cy-logo-sm span {
      color: white;
    }

    .cy-nav {
      display: flex;
      gap: 1px;
    }

    .cy-nav a {
      color: #cce4ff;
      font-size: 10px;
      cursor: pointer;
      padding: 2px 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }

    .cy-nav a:hover {
      background: rgba(255, 255, 255, 0.25);
      color: white;
    }

    .cy-visitbar {
      background: linear-gradient(90deg, #e8f0ff, #d5e4ff);
      padding: 3px 10px;
      border-bottom: 1px solid #aabcdd;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: #336;
    }

    .vcount {
      background: #001a33;
      color: #00ff88;
      padding: 1px 6px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      border: 1px solid #00aa44;
      letter-spacing: 2px;
      border-radius: 1px;
    }

    .cy-ownertxt {
      margin-left: auto;
      color: #446;
      font-size: 10px;
      font-weight: bold;
    }

    .cy-layout {
      display: grid;
      grid-template-columns: 130px 1fr;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .cy-left {
      background: linear-gradient(180deg, #e0ecff 0%, #ccdaf8 100%);
      border-right: 1px solid #99bbdd;
      padding: 7px 5px;
      overflow-y: auto;
    }

    .mmbox {
      background: linear-gradient(180deg, #a8d8ea, #7ab8d8);
      border: 2px solid #5588aa;
      border-radius: 5px;
      padding: 3px;
      margin-bottom: 5px;
      cursor: pointer;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .mmbox::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.15), transparent);
      pointer-events: none;
    }

    .mmbox:hover {
      border-color: #ff8800;
      box-shadow: 0 0 8px rgba(255, 136, 0, 0.3);
    }

    .cy-pname {
      text-align: center;
      font-size: 12px;
      font-weight: bold;
      color: #003080;
      margin-bottom: 1px;
    }

    .cy-pid {
      text-align: center;
      font-size: 10px;
      color: #6677aa;
      margin-bottom: 5px;
    }

    .ddaybox {
      background: linear-gradient(135deg, #fff0f0, #ffd8e0);
      border: 1px solid #ffaacc;
      padding: 3px 5px;
      text-align: center;
      margin-bottom: 5px;
      border-radius: 3px;
    }

    .ddaynum {
      font-size: 16px;
      font-weight: bold;
      color: #cc0044;
      line-height: 1.1;
    }

    .ddaylabel {
      font-size: 9px;
      color: #cc6688;
    }

    .lnav {
      list-style: none;
      margin-bottom: 5px;
      border: 1px solid #99bbdd;
      border-radius: 3px;
      overflow: hidden;
    }

    .lnav li {
      border-bottom: 1px solid #bbccee;
    }

    .lnav li:last-child {
      border-bottom: none;
    }

    .lnav li a {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 7px;
      font-size: 11px;
      color: #224488;
      cursor: pointer;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.7), rgba(220, 235, 255, 0.5));
    }

    .lnav li a:hover {
      background: linear-gradient(90deg, #3366cc, #5588ee);
      color: white;
    }

    .lnav li a.on {
      background: linear-gradient(90deg, #1144aa, #3366cc);
      color: white;
      font-weight: bold;
    }

    .bgmmini {
      background: linear-gradient(90deg, #001a33, #002244);
      color: #00aaff;
      padding: 3px 5px;
      font-size: 9px;
      border: 1px solid #224488;
      border-radius: 2px;
      text-align: center;
      cursor: pointer;
      margin-top: 3px;
    }

    .bgmmini:hover {
      background: linear-gradient(90deg, #002244, #003366);
    }

    .lbtns {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-top: 5px;
    }

    .lbtns button {
      width: 100%;
      font-size: 10px;
      padding: 3px 4px;
    }

    .cy-right {
      background: white;
      padding: 8px;
      overflow-y: auto;
    }

    .sectitle {
      font-size: 13px;
      font-weight: bold;
      color: #1144aa;
      border-bottom: 2px solid #3366cc;
      padding-bottom: 4px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .profile-head {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: flex-start;
    }

    .avt {
      width: 60px;
      height: 60px;
      border: 2px solid #6699cc;
      background: linear-gradient(135deg, #c8ddf8, #a8c8f0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      overflow: hidden;
      flex-shrink: 0;
      border-radius: 3px;
    }

    .avt img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .biobox {
      background: linear-gradient(135deg, #fffef0, #fff8e0);
      border: 1px solid #ddeebb;
      padding: 5px 7px;
      font-size: 11px;
      color: #444;
      line-height: 1.5;
      border-radius: 3px;
      margin-top: 3px;
    }

    .recentbox {
      background: linear-gradient(135deg, #f8f8ff, #f0f4ff);
      border: 1px solid #ccddee;
      padding: 5px 7px;
      margin-bottom: 5px;
      border-radius: 3px;
    }

    .rtitle {
      font-size: 11px;
      font-weight: bold;
      color: #3355aa;
      margin-bottom: 3px;
    }

    .ritem {
      font-size: 11px;
      color: #333;
      padding: 2px 0;
      border-bottom: 1px dashed #dde;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .ritem:hover {
      color: #1144aa;
      background: #f0f4ff;
    }

    .rdate {
      color: #99aacc;
      font-size: 10px;
    }

    .dentry {
      border-bottom: 1px solid #e0e8f8;
      padding: 7px 0;
      cursor: pointer;
    }

    .dentry:hover {
      background: #f4f8ff;
    }

    .dtitle {
      font-size: 12px;
      font-weight: bold;
      color: #1144aa;
      margin-bottom: 2px;
    }

    .dmeta {
      font-size: 10px;
      color: #8899bb;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dpri {
      background: #ffcc00;
      color: #333;
      padding: 0 3px;
      font-size: 9px;
      font-weight: bold;
      border-radius: 2px;
    }

    .dcontent {
      font-size: 11px;
      color: #444;
      margin-top: 5px;
      line-height: 1.6;
      white-space: pre-wrap;
      padding: 6px;
      background: #f8faff;
      border: 1px solid #ddeeff;
      border-radius: 2px;
      display: none;
    }

    .wform {
      background: linear-gradient(135deg, #f5f8ff, #eaf0ff);
      border: 1px solid #aabbdd;
      padding: 8px;
      margin-bottom: 8px;
      border-radius: 3px;
    }

    .wform input[type="text"] {
      width: 100%;
      border: 1px solid #99aacc;
      padding: 3px 4px;
      font-size: 11px;
      font-family: 'Dotum', sans-serif;
      margin-bottom: 4px;
      box-sizing: border-box;
      border-radius: 1px;
    }

    .wform textarea {
      width: 100%;
      height: 70px;
      border: 1px solid #99aacc;
      font-size: 11px;
      font-family: 'Dotum', sans-serif;
      resize: vertical;
      padding: 3px;
      margin-bottom: 4px;
      box-sizing: border-box;
      border-radius: 1px;
    }

    .cbrow {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 5px;
      font-size: 11px;
    }

    .pgrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }

    .pitem {
      aspect-ratio: 1;
      background: linear-gradient(135deg, #d8e8f8, #c8d8ee);
      border: 1px solid #99aacc;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      border-radius: 2px;
    }

    .pitem img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .povl {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 20, 80, 0.6);
      color: white;
      font-size: 10px;
      align-items: flex-end;
      padding: 5px;
    }

    .pitem:hover .povl {
      display: flex;
    }

    .gbentry {
      border-bottom: 1px dashed #ccddf0;
      padding: 6px 0;
    }

    .gbentry:last-child {
      border-bottom: none;
    }

    .gbhead {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
    }

    .gbauthor {
      font-weight: bold;
      font-size: 11px;
      color: #2255cc;
      cursor: pointer;
    }

    .gbauthor:hover {
      color: #ff4400;
    }

    .gbdate {
      font-size: 10px;
      color: #99aacc;
    }

    .gbcont {
      font-size: 11px;
      color: #333;
      line-height: 1.4;
    }

    .gbdel {
      font-size: 10px;
      color: #cc0000;
      cursor: pointer;
      margin-left: 4px;
    }

    .gbdel:hover {
      text-decoration: underline;
    }

    .gbwrite {
      background: linear-gradient(135deg, #f5f8ff, #eaf0ff);
      border: 1px solid #aabbdd;
      padding: 7px;
      margin-bottom: 8px;
      border-radius: 3px;
    }

    .gbwrite textarea {
      width: 100%;
      height: 44px;
      border: 1px solid #99aacc;
      font-size: 11px;
      font-family: 'Dotum', sans-serif;
      resize: none;
      padding: 3px;
      box-sizing: border-box;
      border-radius: 1px;
    }

    .fsbox {
      background: linear-gradient(135deg, #fffbec, #fff8d8);
      border: 1px solid #ddcc77;
      padding: 7px;
      margin-bottom: 7px;
      border-radius: 3px;
    }

    .fstitle {
      font-size: 11px;
      font-weight: bold;
      color: #886600;
      margin-bottom: 5px;
    }

    .fsrow {
      display: flex;
      gap: 4px;
      margin-bottom: 5px;
    }

    .fsrow input {
      flex: 1;
      border: 1px solid #99aacc;
      padding: 2px 5px;
      font-size: 11px;
      font-family: 'Dotum', sans-serif;
      border-radius: 1px;
    }

    .fsresitem {
      padding: 4px 6px;
      cursor: pointer;
      border: 1px solid #ddd088;
      margin-bottom: 2px;
      background: white;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      border-radius: 2px;
    }

    .fsresitem:hover {
      background: #fffae0;
    }

    .fslabelform {
      background: #fffae0;
      border: 1px solid #ddcc77;
      padding: 7px;
      margin-top: 5px;
      border-radius: 3px;
    }

    .fgrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .fcard {
      background: linear-gradient(135deg, #f0f4ff, #e4f0ff);
      border: 1px solid #aabbdd;
      padding: 5px;
      text-align: center;
      cursor: pointer;
      border-radius: 3px;
    }

    .fcard:hover {
      background: linear-gradient(135deg, #ddeeff, #c8d8f8);
      border-color: #8899cc;
    }

    .favt {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #c8ddf8, #a8c8f0);
      border: 1px solid #6699cc;
      margin: 0 auto 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      overflow: hidden;
      border-radius: 2px;
    }

    .favt img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .fname {
      font-size: 10px;
      color: #1144aa;
      font-weight: bold;
    }

    .flabel {
      font-size: 9px;
      color: #6677aa;
    }

    .freq {
      background: linear-gradient(135deg, #fffbec, #fff8d8);
      border: 1px solid #ddcc77;
      padding: 5px 7px;
      margin-bottom: 3px;
      display: flex;
      align-items: center;

  <audio id="bgmaudio" loop></audio>

  <script>
    const CONFIG = { API_BASE: "https://cyworld-production.up.railway.app" };
    const API = CONFIG.API_BASE;
    let cU = null, cT = null, cUN = "", cP = null, cMM = null, isOwner = false, selFriend_un = "", visitUN = "";

    function updateClock() {
      const now = new Date();
      document.getElementById("clock").textContent =
        String(now.getHours()).padStart(2, "0") + ":" + String(now.getMinutes()).padStart(2, "0");
    }
    updateClock(); setInterval(updateClock, 1000);

    function toast(msg, ms = 2500) {
      const t = document.getElementById("toast");
      t.textContent = msg; t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), ms);
    }

    function openCy() {
      document.getElementById("cyOverlay").classList.add("visible");
      showLogin();
    }

    function showLogin() {
      document.getElementById("login-page").classList.add("active");
      document.getElementById("signup-page").classList.remove("active");
    }
    function showSignup() {
      document.getElementById("signup-page").classList.add("active");
      document.getElementById("login-page").classList.remove("active");
    }

    function enterHompy() {
      document.getElementById("cyOverlay").classList.remove("visible");
      document.getElementById("hompy-full").classList.add("visible");
      document.body.classList.remove("xp");
      document.body.classList.add("hompy-bg");
    }

    function doLogout() {
      cU = null; cT = null; cP = null; cUN = ""; visitUN = "";
      localStorage.removeItem("cy_t"); localStorage.removeItem("cy_u"); localStorage.removeItem("cy_p");
      document.getElementById("hompy-full").classList.remove("visible");
      document.body.classList.remove("hompy-bg");
      document.body.classList.add("xp");
      toast("로그아웃 되었습니다");
    }

    function loadSess() {
      const t = localStorage.getItem("cy_t"), u = localStorage.getItem("cy_u");
      if (t && u) { cT = t; cU = JSON.parse(u); const p = localStorage.getItem("cy_p"); if (p) { const sp = JSON.parse(p); cUN = sp?.username || ""; } }
    }

    async function doLogin() {
      const username = document.getElementById("lid").value.trim();
      const pw = document.getElementById("lpw").value;
      if (!username || !pw) { toast("아이디와 비밀번호를 입력해 주세요"); return; }
      try {
        const r = await fetch(`${API}/api/auth/login`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username, password: pw }) });
        const d = await r.json();
        if (!r.ok) { toast(d.detail || "로그인 실패"); return; }
        cT = d.access_token; cU = { id: d.user_id }; cUN = d.profile.username;
        localStorage.setItem("cy_t", cT); localStorage.setItem("cy_u", JSON.stringify(cU)); localStorage.setItem("cy_p", JSON.stringify(d.profile));
        toast("로그인 성공! 환영합니다 🎉");
        enterHompy();
        showHompy(cUN);
      } catch (e) { toast("서버 연결 오류"); }
    }

    async function doSignup() {
      const username = document.getElementById("suid").value.trim();
      const nickname = document.getElementById("sunick").value.trim();
      const pw = document.getElementById("supw").value;
      if (!username || !nickname || !pw) { toast("모든 항목을 입력해 주세요"); return; }
      if (!/^[a-zA-Z0-9_]+$/.test(username)) { toast("아이디는 영문, 숫자, 밑줄만 가능합니다"); return; }
      if (pw.length < 6) { toast("비밀번호는 6자 이상이어야 합니다"); return; }
      try {
        const r = await fetch(`${API}/api/auth/signup`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username, nickname, password: pw }) });
        const d = await r.json();
        if (!r.ok) { toast(d.detail || "가입 실패"); return; }
        toast("가입 완료! 로그인해 주세요 🎊"); showLogin();
      } catch (e) { toast("서버 연결 오류"); }
    }

    function goMyHompy() { if (cUN) showHompy(cUN); }
    function openSearch() { document.getElementById("search-page").style.display = "block"; }
    function closeSearch() { document.getElementById("search-page").style.display = "none"; }

    async function showHompy(username) {
      if (!username) return;
      visitUN = username;
      document.getElementById("hright").innerHTML = '<div class="loading">⏳ 로딩 중...</div>';
      try {
        const headers = cT ? { "Authorization": `Bearer ${cT}` } : {};
        const r = await fetch(`${API}/api/profiles/${username}`, { headers });
        if (!r.ok) { toast("존재하지 않는 미니홈피입니다"); return; }
        cP = await r.json(); isOwner = cU && cU.id === cP.id;
        const mr = await fetch(`${API}/api/minime/${cP.id}`);
        if (mr.ok) cMM = await mr.json();
        renderHUI(cP); showSec("home");
      } catch (e) { document.getElementById("hright").innerHTML = '<div class="loading">서버 연결 오류</div>'; }
    }

    function renderHUI(p) {
      document.getElementById("sbname").textContent = p.nickname;
      document.getElementById("sbid").textContent = `@${p.username}`;
      document.getElementById("howner").textContent = `${p.nickname}의 미니홈피`;
      document.getElementById("vtotal").textContent = String(p.visit_count || 0).padStart(6, "0");
      if (p.couple_date) { const days = Math.floor((new Date() - new Date(p.couple_date)) / (1000 * 60 * 60 * 24)) + 1; document.getElementById("ddaybox").style.display = "block"; document.getElementById("ddaynum").textContent = `D+${days}`; }
      else document.getElementById("ddaybox").style.display = "none";
      if (p.bg_music) { document.getElementById("bgmbar").style.display = "flex"; document.getElementById("bgmt").textContent = p.bg_music; }
      else document.getElementById("bgmbar").style.display = "none";
      document.getElementById("btnedit").style.display = isOwner ? "block" : "none";
      document.getElementById("btnlogout").style.display = isOwner ? "block" : "none";
      document.getElementById("btnfriend").style.display = (!isOwner && cU) ? "block" : "none";
      renderMM(cMM);
    }

    const MO = { casual: "#4499ff", formal: "#334466", sporty: "#ff6633", cute: "#ff88cc", school: "#3355aa", hanbok: "#cc4488", summer: "#ff9944", winter: "#6699cc" };
    const MH = { short: "#5533cc", long: "#cc3355", curl: "#884400", bun: "#884400", bob: "#222222", none: "transparent" };
    const MF = { smile: "M30 34 Q35 38 40 34", sad: "M30 35 Q35 31 40 35", neutral: "M30 34 L40 34", wink: "M30 34 Q35 38 40 34", angry: "M30 33 Q35 30 40 33", surprised: "M32 34 Q35 40 38 34", happy: "M28 34 Q35 42 42 34", shy: "M31 35 Q35 38 39 35" };

    function applyHairStyle(s, hair, hc, prefix) {
      s.querySelectorAll(".dhair").forEach(el => el.remove());
      const h1 = s.querySelector(`#${prefix}h`), h2 = s.querySelector(`#${prefix}h2`);
      if (!h1) return;
      if (hair === "none") { h1.setAttribute("fill", "transparent"); if (h2) h2.setAttribute("fill", "transparent"); }
      else if (hair === "short" || hair === "long") { h1.setAttribute("rx", "18"); h1.setAttribute("ry", "10"); h1.setAttribute("cy", "16"); if (h2) { h2.setAttribute("rx", "18"); h2.setAttribute("ry", "8"); h2.setAttribute("cy", "20"); } h1.setAttribute("fill", hc); if (h2) h2.setAttribute("fill", hc); if (hair === "long") { const g = document.createElementNS("http://www.w3.org/2000/svg", "g"); g.setAttribute("class", "dhair"); g.innerHTML = `<ellipse cx="17" cy="35" rx="5" ry="14" fill="${hc}"/><ellipse cx="53" cy="35" rx="5" ry="14" fill="${hc}"/>`; s.insertBefore(g, s.querySelector("#mmface") || s.querySelector("circle")); } }
      else if (hair === "curl") { h1.setAttribute("fill", hc); if (h2) h2.setAttribute("fill", hc); const g = document.createElementNS("http://www.w3.org/2000/svg", "g"); g.setAttribute("class", "dhair"); g.innerHTML = `<ellipse cx="17" cy="30" rx="5" ry="10" fill="${hc}"/><ellipse cx="53" cy="30" rx="5" ry="10" fill="${hc}"/><circle cx="17" cy="40" r="5" fill="${hc}"/><circle cx="53" cy="40" r="5" fill="${hc}"/>`; s.insertBefore(g, s.querySelector("#mmface") || s.querySelector("circle")); }
      else if (hair === "bun") { h1.setAttribute("fill", hc); if (h2) h2.setAttribute("fill", hc); const g = document.createElementNS("http://www.w3.org/2000/svg", "g"); g.setAttribute("class", "dhair"); g.innerHTML = `<circle cx="25" cy="10" r="7" fill="${hc}"/><circle cx="45" cy="10" r="7" fill="${hc}"/>`; s.appendChild(g); }
      else if (hair === "bob") { h1.setAttribute("rx", "18"); h1.setAttribute("ry", "12"); h1.setAttribute("cy", "18"); if (h2) { h2.setAttribute("rx", "18"); h2.setAttribute("ry", "10"); h2.setAttribute("cy", "21"); } h1.setAttribute("fill", hc); if (h2) h2.setAttribute("fill", hc); const g = document.createElementNS("http://www.w3.org/2000/svg", "g"); g.setAttribute("class", "dhair"); g.innerHTML = `<rect x="17" y="18" width="10" height="18" rx="5" fill="${hc}"/><rect x="43" y="18" width="10" height="18" rx="5" fill="${hc}"/>`; s.insertBefore(g, s.querySelector("#mmface") || s.querySelector("circle")); }
    }

    function renderMM(m) {
      if (!m) return;
      const s = document.getElementById("mmsvg");
      const oc = m.outfitcolor || MO[m.outfit] || "#4499ff";
      const hc = m.haircolor || MH[m.hair] || "#5533cc";
      ["#mmb", "#mmarm-l", "#mmarm-r", "#mmleg-l", "#mmleg-r"].forEach(id => s.querySelector(id)?.setAttribute("fill", oc));
      ["#mmh", "#mmh2"].forEach(id => s.querySelector(id)?.setAttribute("fill", hc));
      s.querySelector("#mmm")?.setAttribute("d", MF[m.face] || MF.smile);
      applyHairStyle(s, m.hair, hc, "mm");
      if (m.bg_color) document.getElementById("mmbox").style.background = `linear-gradient(180deg,${m.bg_color},${m.bg_color}cc)`;
      s.querySelector(".macc")?.remove(); addAcc(s, m.accessory, "macc");
    }

    function addAcc(s, acc, cls) {
      if (!acc || acc === "none") return;
      const g = document.createElementNS("http://www.w3.org/2000/svg", "g"); g.setAttribute("class", cls);
      if (acc === "glasses") g.innerHTML = '<circle cx="28" cy="27" r="5" fill="none" stroke="#333" stroke-width="1.5"/><circle cx="40" cy="27" r="5" fill="none" stroke="#333" stroke-width="1.5"/><line x1="33" y1="27" x2="35" y2="27" stroke="#333" stroke-width="1.5"/>';
      else if (acc === "sunglasses") g.innerHTML = '<circle cx="28" cy="27" r="5" fill="#333" stroke="#000" stroke-width="1"/><circle cx="40" cy="27" r="5" fill="#333" stroke="#000" stroke-width="1"/><line x1="33" y1="27" x2="35" y2="27" stroke="#000" stroke-width="1.5"/>';
      else if (acc === "hat") g.innerHTML = '<rect x="20" y="12" width="30" height="5" rx="2" fill="#cc3300"/><rect x="25" y="4" width="20" height="10" rx="2" fill="#cc3300"/>';

      el.innerHTML = `<div class="sectitle">✏️ 미니홈피 꾸미기</div><div style="margin-bottom:6px"><button class="btn sm" onclick="showSec('minime')">🎨 미니미 꾸미기</button></div><div class="editform"><div style="font-size:11px;font-weight:bold;color:#003080;margin-bottom:7px">프로필 수정</div><div class="frow"><label>닉네임</label><input id="enick" value="${esc(p.nickname || '')}"></div><div class="frow"><label>소개</label><textarea id="ebio" style="flex:1">${esc(p.bio || '')}  </textarea></div><div class="frow"><label>프사 URL</label><input id="eavatar" value="${esc(p.avatar_url || '')}" placeholder="https://..."></div><div class="frow"><label>BGM URL</label><input id="ebgm" value="${esc(p.bg_music || '')}" placeholder="음악 파일 URL"></div><div class="frow"><label>연인 날짜</label><input type="date" id="ecouple" value="${p.couple_date ? p.couple_date.split('T')[0] : ''}"></div><div style="text-align:right;margin-top:7px"><button class="btn btn-blue" onclick="saveProfile()">저장</button></div></div>`;
    }

    async function saveProfile() {
      const data = { nickname: document.getElementById("enick")?.value.trim(), bio: document.getElementById("ebio")?.value.trim(), avatar_url: document.getElementById("eavatar")?.value.trim(), bg_music: document.getElementById("ebgm")?.value.trim(), couple_date: document.getElementById("ecouple")?.value || null };
      try {
        const r = await aFetch(`${API}/api/profiles/me/update`, { method: "PUT", body: JSON.stringify(data) });
        if (!r.ok) { toast("저장 실패"); return; }
        const updated = await r.json(); localStorage.setItem("cy_p", JSON.stringify(updated)); cP = updated; renderHUI(updated); toast("저장 완료! ✨"); showSec("home");
      } catch (e) { toast("오류 발생"); }
    }

    let pendMM = {};
    function loadMMinme(el) {
      const m = cMM || { hair: "short", face: "smile", outfit: "casual", accessory: "none", bg_color: "#a8d8ea" };
      el.innerHTML = `<div class="sectitle">🎨 미니미 꾸미기</div><div class="mmeditor"><div class="mmprev" id="mmprev"><svg id="psvg" viewBox="0 0 70 100" width="88" height="108" xmlns="http://www.w3.org/2000/svg"><ellipse cx="35" cy="97" rx="14" ry="3" fill="rgba(0,0,0,0.1)"/><ellipse cx="35" cy="68" rx="18" ry="22" fill="#4499ff" id="pvb"/><rect x="30" y="44" width="10" height="8" fill="#ffe0b0"/><ellipse cx="14" cy="62" rx="6" ry="10" fill="#4499ff" id="pvarm-l" transform="rotate(-15,14,62)"/><ellipse cx="56" cy="62" rx="6" ry="10" fill="#4499ff" id="pvarm-r" transform="rotate(15,56,62)"/><circle cx="11" cy="72" r="4.5" fill="#ffe0b0"/><circle cx="59" cy="72" r="4.5" fill="#ffe0b0"/><ellipse cx="27" cy="88" rx="6" ry="9" fill="#4499ff" id="pvleg-l"/><ellipse cx="43" cy="88" rx="6" ry="9" fill="#4499ff" id="pvleg-r"/><ellipse cx="26" cy="95" rx="7" ry="4" fill="#333"/><ellipse cx="44" cy="95" rx="7" ry="4" fill="#333"/><circle cx="35" cy="30" r="18" fill="#ffe0b0"/><circle cx="24" cy="34" r="4" fill="#ffb8b8" opacity="0.6"/><circle cx="46" cy="34" r="4" fill="#ffb8b8" opacity="0.6"/><ellipse cx="28" cy="29" rx="3.5" ry="4" fill="white"/><ellipse cx="42" cy="29" rx="3.5" ry="4" fill="white"/><circle cx="29" cy="30" r="2" fill="#333" id="pvpupil-l"/><circle cx="43" cy="30" r="2" fill="#333" id="pvpupil-r"/><circle cx="30" cy="29" r="0.7" fill="white"/><circle cx="44" cy="29" r="0.7" fill="white"/><path d="M29 37 Q35 42 41 37" stroke="#c07050" stroke-width="1.8" fill="none" stroke-linecap="round" id="pvm"/><ellipse cx="35" cy="16" rx="18" ry="10" fill="#5533cc" id="pvh"/><ellipse cx="35" cy="20" rx="18" ry="8" fill="#5533cc" id="pvh2"/></svg></div><div class="optgrp"><label>💇 머리 스타일</label><div class="optrow">${[["short", "단발"], ["long", "긴머리"], ["curl", "곱슬"], ["bun", "묶음"], ["bob", "보브"], ["none", "민머리"]].map(([v, l]) => `<button class="obtn ${m.hair === v ? "on" : ""}" onclick="setMM(this,'hair','${v}')">${l}</button>`).join("")}</div></div><div class="optgrp"><label>🎨 머리 색</label><div class="optrow">${[["#222222", "검정"], ["#884400", "갈색"], ["#ffcc44", "금발"], ["#cc3355", "빨강"], ["#3355cc", "파랑"], ["#ff88cc", "핑크"], ["#eeeeee", "흰색"], ["#8833cc", "보라"]].map(([c, n]) => `<button class="cbtn ${(m.haircolor || "#5533cc") === c ? "on" : ""}" onclick="setMM(this,'haircolor','${c}')" style="background:${c}" title="${n}"></button>`).join("")}</div></div><div class="optgrp"><label>😊 표정</label><div class="optrow">${[["smile", "😊웃음"], ["sad", "😢슬픔"], ["neutral", "😐무표정"], ["wink", "😉윙크"], ["angry", "😠화남"], ["surprised", "😲놀람"], ["happy", "😄크게웃음"], ["shy", "😳수줍음"]].map(([v, l]) => `<button class="obtn ${m.face === v ? "on" : ""}" onclick="setMM(this,'face','${v}')">${l}</button>`).join("")}</div></div><div class="optgrp"><label>👕 의상</label><div class="optrow">${[["casual", "캐주얼"], ["formal", "포멀"], ["sporty", "스포티"], ["cute", "큐트"], ["school", "교복"], ["hanbok", "한복"], ["summer", "여름"], ["winter", "겨울"]].map(([v, l]) => `<button class="obtn ${m.outfit === v ? "on" : ""}" onclick="setMM(this,'outfit','${v}')">${l}</button>`).join("")}</div></div><div class="optgrp"><label>🎨 옷 색</label><div class="optrow">${[["#4499ff", "파랑"], ["#ff6633", "주황"], ["#ff88cc", "핑크"], ["#334466", "남색"], ["#44aa44", "초록"], ["#cc3300", "빨강"], ["#ffcc00", "노랑"], ["#9933cc", "보라"], ["#ffffff", "흰색"], ["#333333", "검정"]].map(([c, n]) => `<button class="cbtn ${(m.outfitcolor || "#4499ff") === c ? "on" : ""}" onclick="setMM(this,'outfitcolor','${c}')" style="background:${c}${c === "#ffffff" ? ";border-color:#aaa" : ""}" title="${n}"></button>`).join("")}</div></div><div class="optgrp"><label>✨ 액세서리</label><div class="optrow">${[["none", "없음"], ["glasses", "👓안경"], ["sunglasses", "🕶선글라스"], ["hat", "🎩모자"], ["cap", "🧢캡"], ["ribbon", "🎀리본"], ["earring", "💎귀걸이"], ["mask", "😷마스크"]].map(([v, l]) => `<button class="obtn ${m.accessory === v ? "on" : ""}" onclick="setMM(this,'accessory','${v}')">${l}</button>`).join("")}</div></div><div class="optgrp"><label>🖼 배경색</label><div class="optrow">${[["#a8d8ea", "하늘"], ["#ffb3c1", "핑크"], ["#b5ead7", "민트"], ["#ffd700", "노랑"], ["#c9b1ff", "보라"], ["#ffd4a3", "살구"], ["#b5d5ff", "연파랑"], ["#d4f0a0", "연두"], ["#ffffff", "흰색"], ["#222222", "검정"]].map(([c, n]) => `<button class="cbtn ${m.bg_color === c ? "on" : ""}" onclick="setMM(this,'bg_color','${c}')" style="background:${c}${c === "#ffffff" ? ";border-color:#aaa" : ""}" title="${n}"></button>`).join("")}</div></div><div style="text-align:right;margin-top:8px"><button class="btn btn-blue" onclick="saveMinime()">저장하기</button></div></div>`;
      renderMMPreview(Object.assign({}, m));
    }

    function setMM(btn, key, val) {
      btn.closest(".optrow").querySelectorAll(".obtn,.cbtn").forEach(b => b.classList.remove("on"));
      btn.classList.add("on"); pendMM[key] = val;
      renderMMPreview(Object.assign({}, cMM || {}, pendMM));
    }

    function renderMMPreview(m) {
      const s = document.getElementById("psvg"); if (!s) return;
      const oc = m.outfitcolor || MO[m.outfit] || "#4499ff";
      const hc = m.haircolor || MH[m.hair] || "#5533cc";
      ["#pvb", "#pvarm-l", "#pvarm-r", "#pvleg-l", "#pvleg-r"].forEach(id => s.querySelector(id)?.setAttribute("fill", oc));
      ["#pvh", "#pvh2"].forEach(id => s.querySelector(id)?.setAttribute("fill", hc));
      s.querySelector("#pvm")?.setAttribute("d", MF[m.face] || MF.smile);
      applyHairStyle(s, m.hair, hc, "pv");
      s.querySelector(".pacc")?.remove(); addAcc(s, m.accessory, "pacc");
      const box = document.getElementById("mmprev"); if (box && m.bg_color) box.style.background = `linear-gradient(180deg,${m.bg_color},${m.bg_color}cc)`;
    }

    async function saveMinime() {
      const data = Object.assign({}, cMM || {}, pendMM); delete data.id; delete data.user_id;
      try {
        const r = await aFetch(`${API}/api/minime/me/update`, { method: "PUT", body: JSON.stringify(data) });
        if (!r.ok) { toast("저장 실패"); return; }
        cMM = await r.json(); pendMM = {}; renderMM(cMM); toast("미니미가 저장되었습니다 🎨"); showSec("home");
      } catch (e) { toast("오류 발생"); }
    }

    function goMMEdit() { if (isOwner) showSec("minime"); }

    async function doSearch() {
      const q = document.getElementById("sq")?.value.trim(); if (!q) return;
      const res = document.getElementById("sresults"); if (!res) return;
      res.innerHTML = '<div class="loading">⏳ 검색 중...</div>';
      try {
        const r = await fetch(`${API}/api/search/users?q=${encodeURIComponent(q)}`);
        const data = await r.json();
        if (!data.length) { res.innerHTML = '<div style="text-align:center;padding:20px;color:#888">검색 결과가 없습니다</div>'; return; }
        res.innerHTML = data.map(u => {
          const avt = u.avatar_url ? '<img src="' + u.avatar_url + '">' : "🧑";
          const bio = u.bio ? '<div style="font-size:10px;color:#888">' + esc(u.bio.substring(0, 30)) + '</div>' : '';
          return '<div class="sres" onclick="showHompy(\'' + u.username + '\');closeSearch()"><div class="savt">' + avt + '</div><div><div style="font-size:12px;font-weight:bold;color:#003080">' + esc(u.nickname) + '</div><div style="font-size:10px;color:#666">@' + esc(u.username) + '</div>' + bio + '</div></div>';
        }).join("");
      } catch (e) { res.innerHTML = '<div style="color:#cc0000">오류 발생</div>'; }
    }

    function toggleBgm() {
      const a = document.getElementById("bgmaudio"); const c = document.querySelector(".bgmc");
      if (a.paused) { if (cP?.bg_music) { a.src = cP.bg_music; a.play().catch(() => toast("BGM을 재생할 수 없습니다")); } if (c) c.textContent = "⏸"; }
      else { a.pause(); if (c) c.textContent = "▶"; }
    }

    function esc(s) { if (!s) return ""; return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }
    async function aFetch(url, opts = {}) { if (!cT) throw new Error("Not authenticated"); return fetch(url, { ...opts, headers: { "Content-Type": "application/json", "Authorization": `Bearer ${cT}`, ...(opts.headers || {}) } }); }

    async function loadCounts() {
      try {
        const [d, g, ph, fr] = await Promise.all([
          fetch(`${API}/api/diary/public/${visitUN}`),
          fetch(`${API}/api/guestbook/${visitUN}`),
          fetch(`${API}/api/photos/${visitUN}`),
          fetch(`${API}/api/friends/list/${cP.id}`)
        ]);
        const diary = d.ok ? await d.json() : [];
        const gb = g.ok ? await g.json() : [];
        const photo = ph.ok ? await ph.json() : [];
        const friend = fr.ok ? await fr.json() : [];
        const dc = document.getElementById("cnt-diary"); if (dc) dc.textContent = diary.length;
        const gc = document.getElementById("cnt-gb"); if (gc) gc.textContent = gb.length;
        const pc = document.getElementById("cnt-photo"); if (pc) pc.textContent = photo.length;
        const fc = document.getElementById("cnt-friend"); if (fc) fc.textContent = friend.length;
      } catch (e) { }
    }
    loadSess();
  </script>
